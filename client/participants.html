<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Participant History - HITEK Solutions</title>
    <link rel="stylesheet" href="css/participants.css" />
</head>
<body>
    <nav class="top-nav" aria-label="Main navigation">
        <a href="index.html" class="nav-brand">
            <img src="assets/logo.png" alt="HITEK Solutions logo" />
            <span>HITEK Solutions</span>
        </a>
        <div class="nav-links">
            <a href="index.html">Contract</a>
            <a href="participants.html" class="active">Participants</a>
            <a href="#history">History</a>
        </div>
    </nav>

    <div class="container">
        <div class="header-section">
            <h1>Participant History</h1>
            <div class="actions">
                <button id="refreshBtn" class="btn btn-primary">Refresh</button>
                <button id="addParticipantBtn" class="btn btn-success">+ Add New</button>
            </div>
        </div>

        <!-- Filters -->
        <div class="filters">
            <input type="text" id="searchInput" placeholder="Search by name or ID..." />
            <select id="statusFilter">
                <option value="">All Status</option>
                <option value="Active">Active</option>
                <option value="Completed">Completed</option>
                <option value="Terminated">Terminated</option>
            </select>
            <select id="careerFilter">
                <option value="">All Careers</option>
            </select>
        </div>

        <!-- Stats -->
        <div class="stats">
            <div class="stat-card">
                <span class="stat-number" id="totalCount">0</span>
                <span class="stat-label">Total</span>
            </div>
            <div class="stat-card active">
                <span class="stat-number" id="activeCount">0</span>
                <span class="stat-label">Active</span>
            </div>
            <div class="stat-card completed">
                <span class="stat-number" id="completedCount">0</span>
                <span class="stat-label">Completed</span>
            </div>
            <div class="stat-card terminated">
                <span class="stat-number" id="terminatedCount">0</span>
                <span class="stat-label">Terminated</span>
            </div>
        </div>

        <!-- Table -->
        <div class="table-container">
            <table id="participantsTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>ID Number</th>
                        <th>Career</th>
                        <th>Commencement</th>
                        <th>Termination</th>
                        <th>Status</th>
                        <th>Documents</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="participantsBody">
                    <tr>
                        <td colspan="9" class="loading">Loading participants...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- View Documents Modal -->
    <div id="documentsModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalParticipantName">Documents</h3>
                <button class="close-btn" onclick="closeDocumentsModal()">&times;</button>
            </div>
            <div class="modal-body" id="documentsList">
                <p>Loading documents...</p>
            </div>
        </div>
    </div>

    <script src="js/participants.js"></script>
</body>
</html>
